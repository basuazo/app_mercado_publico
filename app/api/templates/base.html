<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MP Oportunidades{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
</head>
<body
  {% if current_user is defined %}
  hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'
  {% endif %}
>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">MP Oportunidades</a>
    {% if current_user is defined %}
    <div class="d-flex align-items-center gap-3">
      <span class="text-light small">{{ current_user.email }}</span>
      {% if current_user.rol == 'admin' %}
        <a class="btn btn-sm btn-outline-warning" href="/admin/usuarios">Admin</a>
        <a class="btn btn-sm btn-outline-info" href="/salud">Salud</a>
      {% endif %}
      <a class="btn btn-sm btn-outline-light" href="/perfiles">Perfiles</a>
      <a class="btn btn-sm btn-outline-light" href="/seguidas">Seguidas</a>
      <form method="post" action="/logout" class="m-0">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="btn btn-sm btn-outline-danger">Salir</button>
      </form>
    </div>
    {% endif %}
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted small py-3 border-top">
  Fuente: Dirección ChileCompra
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
